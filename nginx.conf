server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Динамический резолвер Docker, чтобы nginx не ломался, если upstream поднялся позже
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Всё API живёт под /api, чтобы не конфликтовать с SPA-роутами (`/ads/42` в браузере — это SPA,
    # а `/api/ads/42` — бекенд). Бэкенды ничего не знают про /api: nginx стрипит префикс через rewrite,
    # так что `/api/auth/login` уходит в auth-service как `/auth/login`.
    location /api/auth {
        set $auth_upstream http://auth-service:8000;
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass $auth_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ads {
        set $ad_upstream http://ad-service:8002;
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass $ad_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/search {
        set $search_upstream http://search-service:8003;
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass $search_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
